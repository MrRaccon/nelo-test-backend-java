# Docker Profile Configuration
spring.application.name=nelo-restaurant-booking-api

# Database Configuration (MySQL for Docker)
spring.datasource.url=jdbc:mysql://mysql-db:3306/restaurantdb
spring.datasource.username=nelo_user
spring.datasource.password=nelo_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Allow special characters in URLs (square brackets for array parameters)
server.tomcat.relaxed-path-chars=[,]
server.tomcat.relaxed-query-chars=[,],{,},|,\\,^,`

# H2 Console (disabled for production)
spring.h2.console.enabled=false

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
